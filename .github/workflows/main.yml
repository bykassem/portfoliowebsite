name: Automatic Sync with Dreamhost

on: [push]

jobs:
 web-deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v2.3.2
    
    - name: Sync files
      uses: SamKirkland/FTP-Deploy-Action@4.0.0
      with:
        server: ftp.bykassem.com
        post: 22
        protocol: ftps
        server-dir: /home/hhtp2/bykassem.com/
        username: ${{ secrets.ftp_username }}
        password: ${{ secrets.ftp_password }}
