name: Node CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ssh deploy
        uses: easingthemes/ssh-deploy@v2.1.5
        env:
          # Private Key
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          # Remote host
          REMOTE_HOST: bykassem.com
          # Remote user
          REMOTE_USER: hhftp2
          # Remote port
          REMOTE_PORT: 22
          # Target directory
          TARGET: /home/hhftp2/bykassem.com
  
