name: Automatic Sync with Dreamhost

on: [push]
    # branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # time out after 15 minutes (default is 360 minutes)
    steps:
    - name: ssh deploy
      uses: easingthemes/ssh-deploy@v2.1.5
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        REMOTE_HOST: ps495228.dreamhostps.com
        REMOTE_USER: hhftp2
        TARGET: /home/hhftp2/bykassem.com/
        ARGS: -I, --ignore-times